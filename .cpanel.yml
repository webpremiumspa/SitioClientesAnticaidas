---
deployment:
  tasks:
    # Publica el FRONTEND (contenido de public/) en la RAÍZ del docroot del
    # subdominio, para que Apache lo sirva en "/" (css, vendor, assets, js).
    # El backend Node corre aparte por Passenger desde su Application Root y
    # atiende sólo las rutas /api (las que no son archivos estáticos).
    - export DEPLOYPATH=/home/somitalc/clientes.anticaidas.cl
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/cp -R portal-clientes/public/. "$DEPLOYPATH/"
