---
deployment:
  tasks:
    # Despliega SOLO la app (subcarpeta portal-clientes) al docroot del subdominio.
    # Los archivos fuente del repo (Portal Clientes.html, xlsx) quedan fuera.
    - export DEPLOYPATH=/home/somitalc/clientes.anticaidas.cl
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/cp -R portal-clientes/. "$DEPLOYPATH/"
